name: Magnifica Humanitas Review
description: Evaluate a subject against the 30 Magnifica Humanitas criteria.
title: "Magnifica Humanitas Review: "
labels: ["magnifica-humanitas-review"]
body:
  - type: markdown
    attributes:
      value: |
        # Magnifica Humanitas Review

        Use this template to evaluate any tool, project, policy, company, product, AI system, institution, or initiative against the principles of [*Magnifica Humanitas*](https://www.vatican.va/content/leo-xiv/en/encyclicals/documents/20250515-magnifica-humanitas.html).

        **Scoring scale:** `0` harms or ignores the principle · `1` weak or symbolic · `2` meaningful but incomplete · `3` strong, concrete, accountable evidence.

        **Summary test:** Is this building Babel (domination, opacity, power concentration) or rebuilding Jerusalem (dignity, justice, shared responsibility)?

  - type: markdown
    attributes:
      value: "## Snapshot"

  - type: input
    id: subject
    attributes:
      label: Subject reviewed
      placeholder: e.g. Acme Corp AI Hiring Tool v2.1
    validations:
      required: true

  - type: input
    id: owner
    attributes:
      label: Owner / sponsor
      placeholder: e.g. Acme Corp

  - type: textarea
    id: context
    attributes:
      label: Context of use
      placeholder: Where and how is the subject used?

  - type: textarea
    id: affected-communities
    attributes:
      label: Affected communities
      placeholder: People and communities affected, including vulnerable groups.

  - type: textarea
    id: highest-stakes
    attributes:
      label: Highest-stakes decisions or harms
      placeholder: Rights, livelihood, safety, truth, dignity, access, labor, environmental, or peace concerns.

  - type: markdown
    attributes:
      value: "## Human Dignity (Metrics 1–3)"

  - type: dropdown
    id: score-1
    attributes:
      label: "1. Person-centered purpose — Does the subject serve real human flourishing, or mainly efficiency, profit, control, novelty, or prestige?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-1
    attributes:
      label: "Evidence for metric 1"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-2
    attributes:
      label: "2. Irreplaceability of the human person — Does it preserve human judgment, conscience, relationships, embodiment, and responsibility where they matter?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-2
    attributes:
      label: "Evidence for metric 2"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-3
    attributes:
      label: "3. Respect for limits and vulnerability — Does it care for weakness, dependency, disability, age, poverty, illness, and embodied life rather than treating them as defects to optimize away?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-3
    attributes:
      label: "Evidence for metric 3"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Common Good (Metrics 4–6)"

  - type: dropdown
    id: score-4
    attributes:
      label: "4. Common good orientation — Are benefits shared broadly, or concentrated among owners, elites, early adopters, or powerful institutions?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-4
    attributes:
      label: "Evidence for metric 4"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-5
    attributes:
      label: "5. Preferential care for the vulnerable — Does it improve conditions for the poor, marginalized, excluded, displaced, or digitally powerless?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-5
    attributes:
      label: "Evidence for metric 5"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-6
    attributes:
      label: "6. Universal access and fair distribution — Are access, affordability, language, disability, geography, and digital literacy actively considered?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-6
    attributes:
      label: "Evidence for metric 6"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Truth and Communication (Metrics 7–9)"

  - type: dropdown
    id: score-7
    attributes:
      label: "7. Truthfulness — Does it promote accuracy, explain uncertainty, resist manipulation, and avoid deceptive presentation?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-7
    attributes:
      label: "Evidence for metric 7"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-8
    attributes:
      label: "8. Epistemic health — Does it strengthen people's ability to think, deliberate, learn, and judge, rather than making them passive or dependent?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-8
    attributes:
      label: "Evidence for metric 8"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-9
    attributes:
      label: "9. Healthy public discourse — Does it reduce polarization, humiliation, outrage, propaganda, and algorithmic distortion?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-9
    attributes:
      label: "Evidence for metric 9"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Freedom and Responsibility (Metrics 10–12)"

  - type: dropdown
    id: score-10
    attributes:
      label: "10. Human agency — Does it expand meaningful human choice, or does it steer, addict, coerce, surveil, or manipulate?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-10
    attributes:
      label: "Evidence for metric 10"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-11
    attributes:
      label: "11. Transparency and explainability — Can affected people understand how decisions are made and why outcomes occur?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-11
    attributes:
      label: "Evidence for metric 11"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-12
    attributes:
      label: "12. Accountability — Are there clear owners, appeal paths, audit trails, and consequences when harm occurs?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-12
    attributes:
      label: "Evidence for metric 12"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Work and Economy (Metrics 13–15)"

  - type: dropdown
    id: score-13
    attributes:
      label: "13. Dignity of work — Does it respect workers, protect livelihoods, improve working conditions, and avoid treating labor as disposable?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-13
    attributes:
      label: "Evidence for metric 13"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-14
    attributes:
      label: "14. Transition support — If it automates or disrupts work, does it include retraining, income protections, worker voice, and realistic adaptation paths?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-14
    attributes:
      label: "Evidence for metric 14"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-15
    attributes:
      label: "15. Economic justice — Does it measure success beyond productivity, growth, or revenue, including dignity, participation, equity, and social health?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-15
    attributes:
      label: "Evidence for metric 15"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Participation and Subsidiarity (Metrics 16–18)"

  - type: dropdown
    id: score-16
    attributes:
      label: "16. Participation — Were affected communities involved before decisions were locked in?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-16
    attributes:
      label: "Evidence for metric 16"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-17
    attributes:
      label: "17. Subsidiarity — Are decisions made at the most local, competent level possible, rather than imposed by distant technical or corporate power?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-17
    attributes:
      label: "Evidence for metric 17"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-18
    attributes:
      label: "18. Pluralism and dialogue — Does it welcome diverse cultures, perspectives, and needs without forcing homogenization?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-18
    attributes:
      label: "Evidence for metric 18"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## AI and Technology Governance (Metrics 19–21)"

  - type: dropdown
    id: score-19
    attributes:
      label: "19. Non-neutrality awareness — Does the project acknowledge that tools encode values, incentives, assumptions, and power?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-19
    attributes:
      label: "Evidence for metric 19"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-20
    attributes:
      label: "20. Human oversight — Are high-stakes decisions meaningfully reviewable by responsible humans?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-20
    attributes:
      label: "Evidence for metric 20"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-21
    attributes:
      label: "21. Proportionality — Is the technology necessary and appropriate, or is it a technical answer looking for a human problem?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-21
    attributes:
      label: "Evidence for metric 21"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Safety, Peace, and Harm Prevention (Metrics 22–24)"

  - type: dropdown
    id: score-22
    attributes:
      label: "22. Nonviolence and peace — Does it avoid enabling war, repression, targeting, escalation, or dehumanization?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-22
    attributes:
      label: "Evidence for metric 22"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-23
    attributes:
      label: "23. Misuse resistance — Has the project seriously anticipated abuse, fraud, exploitation, trafficking, manipulation, cyberattack, or authoritarian use?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-23
    attributes:
      label: "Evidence for metric 23"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-24
    attributes:
      label: "24. Protection of civilians and the vulnerable — In high-risk contexts, does it prioritize those most likely to suffer from mistakes or misuse?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-24
    attributes:
      label: "Evidence for metric 24"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Environment and Supply Chains (Metrics 25–27)"

  - type: dropdown
    id: score-25
    attributes:
      label: "25. Environmental stewardship — Does it account for energy use, waste, extraction, water, emissions, and ecological cost?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-25
    attributes:
      label: "Evidence for metric 25"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-26
    attributes:
      label: "26. Supply chain justice — Does it examine hidden labor, minerals, data work, moderation work, and outsourced harms behind the product?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-26
    attributes:
      label: "Evidence for metric 26"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-27
    attributes:
      label: "27. Long-term stewardship — Does it plan for maintenance, dependency, obsolescence, repair, and downstream effects?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-27
    attributes:
      label: "Evidence for metric 27"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Public-Interest Posture (Metrics 28–30)"

  - type: dropdown
    id: score-28
    attributes:
      label: "28. Humility — Does it avoid utopian promises, inevitability narratives, and 'move fast' arrogance?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-28
    attributes:
      label: "Evidence for metric 28"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-29
    attributes:
      label: "29. Cooperation over domination — Does it build trust, mutual care, cooperation, and solidarity, or does it centralize power?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-29
    attributes:
      label: "Evidence for metric 29"
      placeholder: Describe the evidence behind your score.

  - type: dropdown
    id: score-30
    attributes:
      label: "30. Hope with responsibility — Does it help people act constructively in the present rather than merely fear, wait, consume, or comment?"
      options:
        - "0 – Harms or ignores"
        - "1 – Weak or symbolic"
        - "2 – Meaningful but incomplete"
        - "3 – Strong and accountable"
    validations:
      required: true

  - type: textarea
    id: evidence-30
    attributes:
      label: "Evidence for metric 30"
      placeholder: Describe the evidence behind your score.

  - type: markdown
    attributes:
      value: "## Summary"

  - type: textarea
    id: deal-breakers
    attributes:
      label: Deal-breaker flags
      description: "Note any deal-breaker flags that apply."
      placeholder: |
        - [ ] Treats people primarily as data, profiles, targets, users, consumers, risks, or units of productivity.
        - [ ] Makes high-stakes decisions without meaningful human responsibility, appeal, or remedy.
        - [ ] Concentrates essential data, infrastructure, or decision power in a few opaque hands.
        - [ ] Depends on hidden exploitation in labor, resource extraction, moderation, data labeling, or supply chains.
        - [ ] Claims moral neutrality while embedding contested assumptions in design, ranking, access, or enforcement.
        - [ ] Weakens truth, trust, democratic deliberation, or the ability to distinguish fact from fiction.
        - [ ] Exploits attention, vulnerability, loneliness, addiction, fear, outrage, or sexuality.
        - [ ] Normalizes violence, repression, targeting, escalation, or the removal of human judgment from lethal decisions.
        - [ ] Promises inevitable progress while ignoring those who are displaced, excluded, surveilled, manipulated, or harmed.

  - type: textarea
    id: babel-or-jerusalem
    attributes:
      label: "Babel or Jerusalem?"
      description: "One-paragraph judgment summarizing the overall assessment."
      placeholder: Is this building Babel or rebuilding Jerusalem?
    validations:
      required: true
